name: pixelpilot-ai-prod

services:
  backend:
    build:
      context: ./backend
      target: production
    environment:
      NODE_ENV: production
      PORT: "4000"
      CORS_ORIGIN: "http://frontend"
      MAX_UPLOAD_SIZE_BYTES: "26214400"
    expose:
      - "4000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - backend_history:/app/storage/history
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_outputs:
  backend_history:
